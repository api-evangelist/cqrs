aid: cqrs
name: CQRS
x-type: topic
description: >-
  Command Query Responsibility Segregation (CQRS) is an architectural pattern
  that separates read and write operations for a data store into distinct
  models. Commands mutate state and produce events; queries return data
  optimized for the read side. CQRS is frequently combined with Event Sourcing,
  Domain-Driven Design (DDD), and message-based integration to scale complex
  domains. The pattern is most associated with Greg Young, building on Bertrand
  Meyer's Command-Query Separation principle, and is widely covered in writings
  by Martin Fowler and the Microsoft Patterns and Practices team.
